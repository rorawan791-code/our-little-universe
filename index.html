<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Little Universe ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="our-time">
        <h2>⏳ Our Time</h2>
        <div class="time-card">
            <h3>❤️ Engaged Since</h3>
            <p>24 January 2025</p>
        </div>
        <div class="time-card">
            <h3>💍 Wedding Day</h3>
            <p>28 August 2026</p>
        </div>
    </section>

    <div class="container">
        <h1>🌌<br>Our Little Universe ❤️</h1>
        <p>
            Every star holds a memory.<br>
            Every memory leads back to us.
        </p>
        <button>Enter Our Universe</button>
    </div>

    <section class="love-section">
        <h2>❤️ Tap My Heart</h2>
        <div id="love-heart">❤️</div>
        <p id="love-message">Tap the heart...</p>
    </section>

    <script src="script.js"></script>
</body>
</html>
