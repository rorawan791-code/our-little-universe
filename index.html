<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Little Universe ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SLIDE 1 -->
<div class="slide">
    <div class="container">
        <h1>🌌 Our Little Universe</h1>
        <p>Every star holds a memory. Every memory leads back to us</p>
        <button id="enterBtn">Enter our universe</button>
    </div>
</div>

<!-- SLIDE 2 -->
<div class="slide">
    <h2>Our Time</h2>

    <div class="time-card">
        <h3>❤️ Engagement</h3>
        <p id="engaged"></p>
    </div>

    <div class="time-card">
        <h3>💍 Wedding</h3>
        <p id="wedding"></p>
    </div>
</div>

<!-- SLIDE 3 -->
<div class="slide">
    <div class="love-section">
        <div id="love-heart">❤️</div>
        <div id="love-message">Tap the heart…</div>
    </div>
</div>

<!-- SLIDE 4 -->
<div class="slide">
    <div class="planet-card" id="rusticaBtn">
        <h3>Planet Rustica</h3>
        <p>Tap to explore memory</p>
    </div>

    <div id="hidden-star">⭐</div>
</div>

<!-- SLIDE 5 -->
<div class="slide">
    <div class="song-card">
        <img src="song.jpg" class="song-img">
        <h3>Our Song</h3>
        <button id="musicBtn">▶ Play</button>
        <audio id="song" src="song.mp3"></audio>
    </div>
</div>

<!-- POPUPS -->
<div id="secretLetter" class="popup">
    <div class="popup-content">
        <span id="closeLetter">✕</span>
        <p id="letterText"></p>
    </div>
</div>

<div id="rusticaPopup" class="popup">
    <div class="popup-content">
        <span id="closeRustica">✕</span>
        <img src="rustica.webp">
    </div>
</div>

<!-- NAV -->
<button id="nextBtn">Next ➡️</button>

<script src="script.js"></script>
</body>
</html>
